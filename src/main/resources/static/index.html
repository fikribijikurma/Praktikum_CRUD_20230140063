<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #64748b;
            --bg-color: #f8fafc;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            padding-bottom: 50px;
        }

        .header-section {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: -60px;
            border-radius: 0 0 40px 40px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background-color: var(--primary-color); border: none; }
        .btn-primary:hover { background-color: #4338ca; }

        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .table thead {
            background-color: #f1f5f9;
        }

        .table thead th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            color: var(--secondary-color);
            border: none;
            padding: 20px;
        }

        .table tbody td {
            padding: 18px 20px;
            vertical-align: middle;
            border-color: #f1f5f9;
        }

        .id-badge {
            background-color: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .action-btns .btn {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="header-section text-center">
    <div class="container">
        <h1 class="fw-bold">Management User Console</h1>
        <p class="opacity-75">Kelola data pengguna dengan antarmuka yang lebih efisien</p>
    </div>
</div>

<main class="container">
    <div class="row justify-content-center mb-5">
        <div class="col-lg-10">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3 text-primary">
                            <i class="fas fa-user-plus fa-lg"></i>
                        </div>
                        <h5 class="card-title mb-0 fw-bold" id="formTitle">Tambah User Baru</h5>
                    </div>

                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Nama Lengkap</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="far fa-user"></i></span>
                                    <input type="text" id="userName" class="form-control border-start-0" placeholder="Contoh: Auliya Fikri" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Umur</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="far fa-calendar"></i></span>
                                    <input type="number" id="userAge" class="form-control border-start-0" placeholder="Tahun" required>
                                </div>
                            </div>
                            <div class="col-md-3 d-flex align-items-end gap-2">
                                <button type="submit" id="btnSubmit" class="btn btn-primary w-100 justify-content-center">
                                    <i class="fas fa-save"></i> Simpan
                                </button>
                                <button type="button" id="btnCancel" class="btn btn-light" style="display:none;" onclick="resetForm()">
                                    Batal
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold text-uppercase text-muted small mb-0">List Database Pengguna</h6>
                <span class="badge bg-soft-primary text-primary" id="userCount">0 Users</span>
            </div>

            <div class="table-container">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th style="width: 40%">Informasi User</th>
                        <th style="width: 30%">System ID</th>
                        <th style="width: 30%" class="text-end">Aksi Manajemen</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
    const apiUrl = '/api/users';
    let isUpdate = false;

    $(document).ready(function() {
        loadUsers();

        $('#userForm').submit(function(e) {
            e.preventDefault();
            const userData = {
                name: $('#userName').val(),
                age: parseInt($('#userAge').val())
            };

            if (isUpdate) {
                updateUser($('#userId').val(), userData);
            } else {
                addUser(userData);
            }
        });
    });

    function loadUsers() {
        $.get(apiUrl, function(response) {
            let rows = '';
            const users = response.data || [];
            $('#userCount').text(`${users.length} Users`);

            if(users.length === 0) {
                rows = `<tr><td colspan="3" class="text-center py-5 text-muted small">Belum ada data pengguna tersedia.</td></tr>`;
            } else {
                users.forEach(user => {
                    rows += `
                        <tr>
                            <td>
                                <div class="fw-bold text-dark">${user.name}</div>
                                <div class="text-muted small">${user.age} Tahun</div>
                            </td>
                            <td><span class="id-badge">${user.id}</span></td>
                            <td class="text-end action-btns">
                                <button class="btn btn-outline-warning btn-sm" onclick="editUser('${user.id}', '${user.name}', ${user.age})">
                                    <i class="far fa-edit"></i> Edit
                                </button>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteUser('${user.id}')">
                                    <i class="far fa-trash-alt"></i> Hapus
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            $('#userTableBody').html(rows);
        });
    }

    function addUser(data) {
        $.ajax({
            url: apiUrl, type: 'POST', contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() { resetForm(); loadUsers(); },
            error: function() { alert('Gagal menambah user.'); }
        });
    }

    function updateUser(id, data) {
        $.ajax({
            url: `${apiUrl}/${id}`, type: 'PUT', contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() { resetForm(); loadUsers(); },
            error: function() { alert('Gagal memperbarui user.'); }
        });
    }

    function deleteUser(id) {
        if(confirm('Hapus data pengguna ini secara permanen?')) {
            $.ajax({
                url: `${apiUrl}/${id}`, type: 'DELETE',
                success: function() { loadUsers(); }
            });
        }
    }

    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name);
        $('#userAge').val(age);
        $('#formTitle').text('Update Informasi User');
        $('#btnSubmit').html('<i class="fas fa-check"></i> Update').removeClass('btn-primary').addClass('btn-success');
        $('#btnCancel').show();
        isUpdate = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        $('#userId').val('');
        $('#userName').val('');
        $('#userAge').val('');
        $('#formTitle').text('Tambah User Baru');
        $('#btnSubmit').html('<i class="fas fa-save"></i> Simpan').removeClass('btn-success').addClass('btn-primary');
        $('#btnCancel').hide();
        isUpdate = false;
    }
</script>
</body>
</html>
